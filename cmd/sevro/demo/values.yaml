# Demo chart — exercises every Year-1 detector.
# - api         cpu-overprovisioned + memory-overprovisioned
# - worker      missing-memory-limit + missing-cpu-limit
# - cache       image-pinned-latest (Tag: latest)
# - logger      image-pinned-latest (no tag)
# - shipper     replicas-too-high (10 replicas, no HPA)
# - admin-tool  privileged-container + run-as-root (explicit) + allow-privilege-escalation
# - sniffer     host-network + host-path-volume
# - bursty      cpu-limit-far-above-request + memory-limit-far-above-request
# - dev-build   unbounded-image-tag (tag: main) + read-only-root-fs-missing
# - clean       fully right-sized + secure; produces no findings

api:
  image:
    repository: example/api
    tag: "1.4.2"
  replicas: 3
  resources:
    requests:
      cpu: "2"
      memory: "1.6Gi"
    limits:
      cpu: "2.5"
      memory: "2Gi"

worker:
  image: example/worker:0.9.0
  replicas: 2
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
  # Workload sets runAsNonRoot so it doesn't trip the security detector
  # along with the resource ones we want to exercise.
  securityContext:
    runAsNonRoot: true

cache:
  image:
    repository: redis
    tag: "latest"
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  securityContext:
    runAsNonRoot: true

logger:
  image: fluentd
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  securityContext:
    runAsNonRoot: true

shipper:
  image:
    repository: example/shipper
    tag: "v2.1.0"
  replicas: 10
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  securityContext:
    runAsNonRoot: true

admin-tool:
  image:
    repository: example/admin
    tag: "v0.4.0"
  replicas: 1
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"
  securityContext:
    privileged: true
    runAsNonRoot: false
    allowPrivilegeEscalation: true
    readOnlyRootFilesystem: true

sniffer:
  image:
    repository: example/sniffer
    tag: "v1.0.0"
  replicas: 1
  hostNetwork: true
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"
  volumes:
    - name: host-logs
      hostPath:
        path: /var/log
  securityContext:
    runAsNonRoot: true
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false

bursty:
  image:
    repository: example/queue-worker
    tag: "v3.1.4"
  replicas: 2
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "2"
      memory: "4Gi"
  securityContext:
    runAsNonRoot: true
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false

dev-build:
  image:
    repository: example/scratch
    tag: "main"
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "200m"
      memory: "512Mi"
  securityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false

clean:
  image:
    repository: example/clean
    tag: "v3.2.1"
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  securityContext:
    runAsNonRoot: true
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
