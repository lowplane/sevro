#
# Auto-merge Dependabot PRs when CI passes.
#
# Patch and minor updates merge automatically. Major version bumps are
# left for human review.
#
# Requires:
#   - repo setting: "Allow auto-merge" must be enabled.
#   - branch protection: required status checks must be configured so
#     auto-merge waits for them to pass before merging.
name: Dependabot auto-merge

on:
  pull_request_target:

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch and minor updates
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge "$PR_URL" --auto --squash
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on skipped major updates
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        run: |
          gh pr comment "$PR_URL" --body "Major version bump detected ($DEPENDENCY $PREV → $NEW). Not auto-merging; please review the changelog and approve manually."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          DEPENDENCY: ${{ steps.meta.outputs.dependency-names }}
          PREV: ${{ steps.meta.outputs.previous-version }}
          NEW: ${{ steps.meta.outputs.new-version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
