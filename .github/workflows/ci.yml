name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true
      - run: go test -race -count=1 ./...
      - run: go build -o /tmp/costify ./cmd/costify
      - run: /tmp/costify --version

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  npm-pack:
    name: npm pack (sanity check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - run: COSTIFY_SKIP_POSTINSTALL=1 npm install --ignore-scripts
      - run: npm pack
